[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

[[redirects]]
  from = "/api/evaluate"
  to = "/.netlify/functions/evaluate"
  status = 200

[[redirects]]
  from = "/api/results"
  to = "/.netlify/functions/results"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
